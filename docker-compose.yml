version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: mimir-postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  auth-service:
    image: projectmimir-auth-service
    container_name: auth-service
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "50051:50051"
    volumes:
      - ./auth-service/migrations:/app/migrations:ro
      # - ./auth-service:/app/auth-service:cached

  adminer:
    image: adminer
    container_name: adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
